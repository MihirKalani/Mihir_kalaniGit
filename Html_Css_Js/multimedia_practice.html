<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Multimedia & iFrame Practice</title>
  </head>
  <body>
    <h1>HTML Multimedia & iFrame Practice</h1>

    <h2>Audio Player</h2>

    <audio controls autoplay muted loop>
      <source
        src="https://www.w3schools.com/html/horse.mp3"
        type="audio/mpeg"
      />
      Your browser does not support the audio element.
    </audio>

    <h2>Video Player</h2>

    <video width="500" height="300" controls muted>
      <source
        src="https://www.w3schools.com/html/mov_bbb.mp4"
        type="video/mp4"
      />
      Your browser does not support the video tag.
    </video>

    <h2>iFrame Examples</h2>

    <iframe
      src="https://www.w3schools.com/html/mov_bbb.mp4"
      width="500"
      height="300"
    >
    </iframe>

    <br /><br />

    <iframe src="https://www.w3schools.com/" width="800" height="400"> </iframe>

    <br /><br />

    <iframe src="Form.html" width="800" height="400"> </iframe>
  </body>
</html>
